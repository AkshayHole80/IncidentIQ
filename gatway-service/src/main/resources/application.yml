server:
  port: 8080

spring:
  application:
    name: GATEWAY-SERVICE

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users/**

            - id: incident-service
              uri: lb://INCIDENT-SERVICE
              predicates:
                - Path=/api/v1/incidents/**

            - id: ai-service
              uri: lb://AI-SERVICE
              predicates:
                - Path=/api/v1/ai/**

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
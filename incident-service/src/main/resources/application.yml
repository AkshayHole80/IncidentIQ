server:
  port: 8082

spring:
  application:
    name: INCIDENT-SERVICE

  datasource:
    url: ${INCIDENT_DB_URL}
    username: ${INCIDENT_DB_USERNAME}
    password: ${INCIDENT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION}
  s3:
    bucket-name: ${AWS_S3_BUCKET}

eureka:
  instance:
    hostname: ${INCIDENT_SERVICE_HOSTNAME:localhost}
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URI:http://localhost:8761/eureka}
server:
  port: 8084

spring:
  application:
    name: NOTIFICATION-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/incidentiq_notification_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true
version: "3.9"

name: incidentiq

services:

  ####################################################
  # REDIS
  ####################################################
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - incidentiq-network


  ####################################################
  # KAFKA (KRaft)
  ####################################################
  kafka:
    image: apache/kafka:latest
    container_name: kafka

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - incidentiq-network


  ####################################################
  # EUREKA
  ####################################################
  eureka-server:

    image: mrakshayhole/eureka-server:latest

    container_name: eureka-server

    env_file:
      - .env.docker

    ports:
      - "8761:8761"

    restart: unless-stopped

    networks:
      - incidentiq-network

    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy


  ####################################################
  # GATEWAY
  ####################################################
  gateway-service:

    image: mrakshayhole/gateway-service:latest

    container_name: gateway-service

    env_file:
      - .env.docker

    ports:
      - "8080:8080"

    restart: unless-stopped

    depends_on:
      eureka-server:
        condition: service_started

    networks:
      - incidentiq-network
  ####################################################
  # USER SERVICE
  ####################################################
  user-service:

    image: mrakshayhole/user-service:latest

    container_name: user-service

    env_file:
      - .env.docker

    ports:
      - "8081:8081"

    restart: unless-stopped

    depends_on:
      redis:
        condition: service_healthy

      kafka:
        condition: service_started

      eureka-server:
        condition: service_started

    networks:
      - incidentiq-network

    extra_hosts:
      - "host.docker.internal:host-gateway"

  ####################################################
  # INCIDENT SERVICE
  ####################################################
  incident-service:

    image: mrakshayhole/incident-service:latest

    container_name: incident-service

    env_file:
      - .env.docker

    ports:
      - "8082:8082"

    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started

    networks:
      - incidentiq-network

    extra_hosts:
      - "host.docker.internal:host-gateway"
  ####################################################
  # NOTIFICATION SERVICE
  ####################################################
  notification-service:
    image: mrakshayhole/notification-service:latest
    container_name: notification-service

    env_file:
      - .env.docker

    ports:
      - "8084:8084"

    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_started
      eureka-server:
        condition: service_started

    networks:
      - incidentiq-network

    extra_hosts:
      - "host.docker.internal:host-gateway"

  ####################################################
  # AI SERVICE
  ####################################################
  ai-service:
    image: mrakshayhole/ai-service:latest

    container_name: ai-service

    env_file:
      - .env.docker

    ports:
      - "8083:8083"

    restart: unless-stopped

    depends_on:
      eureka-server:
        condition: service_started

    networks:
      - incidentiq-network
  ####################################################
  # FRONTEND
  ####################################################
  frontend:
    image: mrakshayhole/frontend:latest

    container_name: frontend

    ports:
      - "3000:80"

    restart: unless-stopped

    depends_on:
      gateway-service:
        condition: service_started

    networks:
      - incidentiq-network

volumes:

  redis-data:


networks:

  incidentiq-network:

    driver: bridge


